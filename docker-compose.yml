services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reservasi_dokter_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000

  mysql:
    image: mysql:8.0
    container_name: reservasi_dokter_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: reservasi_dokter
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    ports:
      - "3306:3306"